    :root {

    * { box-sizing: border-box; margin: 0; padding: 0; }

/* Tempo change list */
#tempoList {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
  max-height: 320px;
  overflow-y: auto;
  padding-right: 2px;
}
.tempo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  position: relative;
  transition: border-color .2s;
}
.tempo-row.active-segment {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(91,141,238,.18);
}
.tempo-row .seg-label {
  font-size: .72rem;
  color: var(--muted);
  min-width: 70px;
}
.tempo-row .seg-bpm {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  min-width: 54px;
}
.tempo-row .seg-info {
  font-size: .8rem;
  color: var(--muted);
  flex: 1;
}
.tempo-row .badge {
  font-size: .68rem;
  background: rgba(91,141,238,.18);
  color: var(--accent);
  border-radius: 5px;
  padding: 2px 7px;
  margin-left: 6px;
}
.delete-btn {
  background: none;
  border: none;
  color: var(--red);
  cursor: pointer;
  font-size: 1rem;
  padding: 4px 6px;
  border-radius: 6px;
  line-height: 1;
  opacity: .7;
  transition: opacity .15s;
}
.delete-btn:hover { opacity: 1; }
.delete-btn:disabled { opacity: .2; cursor: default; }

/* Buttons */
.btn {
  padding: 10px 22px;
  border-radius: 9px;
  font-size: .9rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: transform .1s, opacity .2s;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .35; cursor: default; }
.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
}
.btn-green {
  background: var(--green);
  color: #0f1117;
}
.btn-yellow {
  background: var(--yellow);
  color: #0f1117;
}
.btn-red {
  background: var(--red);
  color: #fff;
}
.btn-ghost {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}

/* Playback area */
#playbackCard {
  max-width: 680px;
  margin: 0 auto 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 20px;
}
.beat-display {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.beat-dot {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border);
  transition: background .08s, box-shadow .08s, border-color .08s;
}
.beat-dot.on-beat {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 14px var(--beat-glow);
}
.beat-dot.on-beat-1 {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 18px rgba(62,207,142,.5);
}

.now-playing {
  text-align: center;
  margin-bottom: 18px;
}
.np-bpm {
  font-size: 3rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  transition: color .3s;
}
.np-bpm.changed { color: var(--yellow); }
.np-label {
  font-size: .78rem;
  color: var(--muted);
  margin-top: 3px;
}
.np-progress {
  font-size: .85rem;
  color: var(--muted);
  margin-top: 6px;
}
.np-progress span { color: var(--text); font-weight: 600; }

.progress-bar-wrap {
  background: var(--surface2);
  border-radius: 6px;
  height: 6px;
  margin-bottom: 18px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 6px;
  transition: width .1s linear;
  width: 0%;
}

.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

/* Segment timeline */
#timeline {
  max-width: 680px;
  margin: 0 auto 18px;
}
.tl-bar {
  display: flex;
  height: 28px;
  border-radius: 8px;
  overflow: hidden;
  gap: 2px;
}
.tl-seg {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .65rem;
  font-weight: 700;
  color: #fff;
  border-radius: 4px;
  min-width: 0;
  overflow: hidden;
  transition: opacity .2s;
  cursor: default;
  position: relative;
}
.tl-seg.played { opacity: .4; }
.tl-seg.current { box-shadow: 0 0 0 2px #fff; opacity: 1; }
.tl-seg span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px; }

/* Sound toggle */
.sound-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  justify-content: center;
}
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .82rem;
  color: var(--muted);
}
.toggle {
  position: relative;
  width: 38px;
  height: 22px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--surface2);
  border-radius: 22px;
  cursor: pointer;
  transition: background .2s;
  border: 1px solid var(--border);
}
.toggle-slider:before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 2px; top: 2px;
  background: var(--muted);
  border-radius: 50%;
  transition: transform .2s, background .2s;
}
.toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
.toggle input:checked + .toggle-slider:before { transform: translateX(16px); background: #fff; }

/* Status banner */
#statusBanner {
  max-width: 680px;
  margin: 0 auto 12px;
  background: rgba(62,207,142,.12);
  border: 1px solid rgba(62,207,142,.3);
  border-radius: 10px;
  padding: 8px 16px;
  font-size: .84rem;
  color: var(--green);
  display: none;
  text-align: center;
}

@media (max-width: 480px) {
  .np-bpm { font-size: 2.4rem; }
  .row { flex-direction: column; }
}

<body>

<h1>🎵 Band Metronome</h1>
<p class="subtitle">Multi-tempo metronome — set tempo changes and play through your whole song</p>

<!-- Status -->

<div id="statusBanner"></div>

<!-- Song Setup -->

<div class="card">
  <div class="card-title">⚙️ Song Setup</div>
  <div class="row">
    <div class="field">
      <label>Time Signature (beats/bar)</label>
      <select id="timeSig">
        <option value="2">2/4</option>
        <option value="3">3/4</option>
        <option value="4" selected>4/4</option>
        <option value="5">5/4</option>
        <option value="6">6/8</option>
        <option value="7">7/8</option>
        <option value="12">12/8</option>
      </select>
    </div>
    <div class="field">
      <label>Count-in Measures</label>
      <select id="countIn">
        <option value="0">None</option>
        <option value="1" selected>1 measure</option>
        <option value="2">2 measures</option>
      </select>
    </div>
    <div class="field">
      <label>Accent Beat 1</label>
      <select id="accentMode">
        <option value="1" selected>Yes – high click</option>
        <option value="0">No – flat click</option>
      </select>
    </div>
  </div>
</div>

<!-- Add Tempo Section -->

<div class="card">
  <div class="card-title">🎚️ Tempo Segments</div>
  <div id="tempoList"></div>
  <div class="row" style="margin-bottom:14px;">
    <div class="field">
      <label>BPM</label>
      <input type="number" id="addBpm" value="100" min="20" max="300" placeholder="e.g. 120">
    </div>
    <div class="field">
      <label>Length (measures)</label>
      <input type="number" id="addMeasures" value="8" min="1" max="999" placeholder="e.g. 8">
    </div>
    <div class="field" style="min-width:0;">
      <label>&nbsp;</label>
      <button class="btn btn-accent" onclick="addSegment()">+ Add Segment</button>
    </div>
  </div>
  <div class="row">
    <button class="btn btn-ghost" style="font-size:.8rem;" onclick="loadExample()">Load Example Song</button>
    <button class="btn btn-ghost" style="font-size:.8rem; color:var(--red);" onclick="clearAll()">Clear All</button>
  </div>
</div>

<!-- Playback -->

<div id="playbackCard">
  <div class="beat-display" id="beatDisplay"></div>
  <div class="now-playing">
    <div class="np-bpm" id="npBpm">—</div>
    <div class="np-label" id="npLabel">BPM</div>
    <div class="np-progress" id="npProgress">Add segments and press Start</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="controls">
    <button class="btn btn-green" id="startBtn" onclick="startMetronome()">▶ Start</button>
    <button class="btn btn-yellow" id="restartBtn" onclick="restartMetronome()" disabled>↺ Restart</button>
    <button class="btn btn-red" id="stopBtn" onclick="stopMetronome()" disabled>■ Stop</button>
  </div>
  <div class="sound-row">
    <label class="toggle-wrap">
      <span>Click Sound:</span>
      <label class="toggle">
        <input type="checkbox" id="soundToggle" checked>
        <span class="toggle-slider"></span>
      </label>
      <span id="soundLabel">On</span>
    </label>
    <label class="toggle-wrap" style="margin-left:16px;">
      <span>Visual Flash:</span>
      <label class="toggle">
        <input type="checkbox" id="flashToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </label>
  </div>
</div>

<!-- Timeline -->

<div id="timeline">
  <div class="card-title" style="max-width:680px; margin: 0 auto 6px; padding-left:4px; font-size:.72rem; color:var(--muted);">SONG TIMELINE</div>
  <div class="tl-bar" id="tlBar"></div>
</div>

<script>
  // ─── State ──────────────────────────────────────────────────────────────────
  let segments = [];       // [{bpm, measures}]
  let audioCtx = null;
  let isPlaying = false;
  let scheduleTimer = null;
  let nextBeatTime = 0;
  let currentSegIdx = 0;
  let currentBeatInSeg = 0;
  let currentMeasureInSeg = 0;
  let currentBeatInMeasure = 0;
  let totalBeats = 0;
  let beatsElapsed = 0;
  let countInBeats = 0;
  let isCountIn = false;
  let bpmChangedFlash = false;
  let prevSegIdx = -1;

  const LOOK_AHEAD = 0.1;   // seconds
  const SCHEDULE_INTERVAL = 25; // ms

  // ─── Colors for timeline segments ───────────────────────────────────────────
  const segColors = [
    '#5b8dee','#7c5be3','#3ecf8e','#f5a623','#e35b5b',
    '#e35baa','#5be3c8','#c8e35b','#e3925b','#5b8dee'
  ];

  // ─── Audio ───────────────────────────────────────────────────────────────────
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClick(time, isAccent, isCountIn) {
    if (!document.getElementById('soundToggle').checked) return;
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (isCountIn) {
      osc.frequency.value = isAccent ? 1100 : 880;
      gain.gain.setValueAtTime(0.22, time);
    } else if (isAccent) {
      osc.frequency.value = 1200;
      gain.gain.setValueAtTime(0.55, time);
    } else {
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.3, time);
    }
    gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.06);
    osc.start(time);
    osc.stop(time + 0.07);
  }

  // ─── Segment management ─────────────────────────────────────────────────────
  function addSegment() {
    const bpm = parseInt(document.getElementById('addBpm').value);
    const measures = parseInt(document.getElementById('addMeasures').value);
    if (isNaN(bpm) || bpm < 20 || bpm > 300) return showStatus('BPM must be 20–300', 'red');
    if (isNaN(measures) || measures < 1) return showStatus('Measures must be ≥ 1', 'red');
    segments.push({ bpm, measures });
    renderSegments();
    renderTimeline();
    showStatus(`Added: ${bpm} BPM × ${measures} measures`, 'green');
  }

  function deleteSegment(i) {
    segments.splice(i, 1);
    renderSegments();
    renderTimeline();
  }

  function renderSegments() {
    const list = document.getElementById('tempoList');
    if (segments.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.83rem;padding:12px 0;">No segments yet — add one above</div>';
      return;
    }
    const timeSig = parseInt(document.getElementById('timeSig').value);
    let html = '';
    let runningMeasure = 1;
    segments.forEach((s, i) => {
      const endMeasure = runningMeasure + s.measures - 1;
      const isActive = isPlaying && i === currentSegIdx && !isCountIn;
      html += `
        <div class="tempo-row ${isActive ? 'active-segment' : ''}">
          <div>
            <div class="seg-bpm">${s.bpm} <span style="font-size:.7rem;font-weight:400;color:var(--muted)">BPM</span></div>
          </div>
          <div class="seg-info">
            <span style="color:var(--text)">${s.measures} measure${s.measures !== 1 ? 's' : ''}</span>
            <span class="badge">m${runningMeasure}–${endMeasure}</span>
            <span class="badge" style="background:rgba(124,91,227,.15);color:var(--accent2)">${timeSig}/4</span>
          </div>
          <button class="delete-btn" onclick="deleteSegment(${i})" ${isPlaying ? 'disabled' : ''} title="Remove">✕</button>
        </div>`;
      runningMeasure += s.measures;
    });
    list.innerHTML = html;
  }

  function renderTimeline() {
    const bar = document.getElementById('tlBar');
    if (segments.length === 0) { bar.innerHTML = ''; return; }
    const total = segments.reduce((a, s) => a + s.measures, 0);
    let html = '';
    segments.forEach((s, i) => {
      const pct = (s.measures / total * 100).toFixed(2);
      const color = segColors[i % segColors.length];
      const played = isPlaying && i < currentSegIdx;
      const current = isPlaying && i === currentSegIdx && !isCountIn;
      html += `<div class="tl-seg ${played?'played':''} ${current?'current':''}"
        style="width:${pct}%;background:${color};" title="${s.bpm} BPM – ${s.measures} measures">
        <span>${s.bpm}</span></div>`;
    });
    bar.innerHTML = html;
  }

  // ─── Playback ────────────────────────────────────────────────────────────────
  function startMetronome() {
    if (segments.length === 0) return showStatus('Add at least one segment first!', 'red');
    if (isPlaying) return;
    getAudioCtx().resume();
    isPlaying = true;
    currentSegIdx = 0;
    currentBeatInSeg = 0;
    currentMeasureInSeg = 0;
    currentBeatInMeasure = 0;
    prevSegIdx = -1;

    const timeSig = parseInt(document.getElementById('timeSig').value);
    const countInMeasures = parseInt(document.getElementById('countIn').value);
    countInBeats = countInMeasures * timeSig;
    isCountIn = countInBeats > 0;
    totalBeats = segments.reduce((a, s) => a + s.measures * timeSig, 0);
    beatsElapsed = 0;

    nextBeatTime = getAudioCtx().currentTime + 0.05;
    scheduleTimer = setInterval(schedulerTick, SCHEDULE_INTERVAL);

    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('restartBtn').disabled = false;
    setBeatDots(timeSig, -1);
    updatePlaybackUI();
  }

  function stopMetronome() {
    isPlaying = false;
    clearInterval(scheduleTimer);
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('restartBtn').disabled = false;
    document.getElementById('npBpm').textContent = '—';
    document.getElementById('npLabel').textContent = 'BPM';
    document.getElementById('npProgress').textContent = 'Stopped';
    document.getElementById('progressFill').style.width = '0%';
    renderSegments();
    renderTimeline();
    setBeatDots(parseInt(document.getElementById('timeSig').value), -1);
  }

  function restartMetronome() {
    stopMetronome();
    setTimeout(() => startMetronome(), 80);
  }

  function schedulerTick() {
    const ctx = getAudioCtx();
    while (nextBeatTime < ctx.currentTime + LOOK_AHEAD) {
      scheduleNextBeat(nextBeatTime);
      advanceBeat();
    }
  }

  function scheduleNextBeat(time) {
    const timeSig = parseInt(document.getElementById('timeSig').value);
    const accent = parseInt(document.getElementById('accentMode').value);

    if (isCountIn) {
      const countInMeasures = parseInt(document.getElementById('countIn').value);
      const totalCountBeats = countInMeasures * timeSig;
      const countBeat = totalCountBeats - countInBeats;
      const isAcc = (countBeat % timeSig === 0) && accent;
      playClick(time, isAcc, true);

      // Schedule visual update
      const delay = (time - getAudioCtx().currentTime) * 1000;
      const beatInMeasure = countBeat % timeSig;
      setTimeout(() => {
        if (!isPlaying) return;
        flashBeat(beatInMeasure, timeSig, isAcc);
        document.getElementById('npBpm').textContent = segments[0].bpm;
        document.getElementById('npLabel').textContent = 'BPM (count-in)';
        document.getElementById('npProgress').innerHTML =
          `Count-in: beat <span>${beatInMeasure + 1}</span> / ${timeSig}`;
      }, Math.max(0, delay));
      return;
    }

    const seg = segments[currentSegIdx];
    const isAccent = (currentBeatInMeasure === 0) && accent;
    playClick(time, isAccent, false);

    // snapshot for closure
    const snapSeg = currentSegIdx;
    const snapBeat = currentBeatInMeasure;
    const snapMeasureInSeg = currentMeasureInSeg;
    const snapBeatsElapsed = beatsElapsed;
    const delay = (time - getAudioCtx().currentTime) * 1000;

    setTimeout(() => {
      if (!isPlaying) return;
      flashBeat(snapBeat, timeSig, isAccent);
      updateNowPlaying(snapSeg, snapBeat, snapMeasureInSeg, snapBeatsElapsed, timeSig);
    }, Math.max(0, delay));
  }

  function advanceBeat() {
    const timeSig = parseInt(document.getElementById('timeSig').value);

    if (isCountIn) {
      const bpm = segments[0].bpm;
      nextBeatTime += 60 / bpm;
      countInBeats--;
      if (countInBeats <= 0) isCountIn = false;
      return;
    }

    const seg = segments[currentSegIdx];
    const bpm = seg.bpm;
    nextBeatTime += 60 / bpm;
    beatsElapsed++;
    currentBeatInMeasure++;
    currentBeatInSeg++;

    if (currentBeatInMeasure >= timeSig) {
      currentBeatInMeasure = 0;
      currentMeasureInSeg++;
    }

    if (currentMeasureInSeg >= seg.measures) {
      currentMeasureInSeg = 0;
      currentBeatInSeg = 0;
      currentSegIdx++;
      if (currentSegIdx >= segments.length) {
        // Song done
        setTimeout(() => {
          if (isPlaying) {
            stopMetronome();
            showStatus('🎶 Song complete!', 'green');
            document.getElementById('npProgress').textContent = '🎶 Song complete!';
          }
        }, 100);
      }
    }
  }

  // ─── UI updates ──────────────────────────────────────────────────────────────
  function setBeatDots(timeSig, activeBeat) {
    const container = document.getElementById('beatDisplay');
    let html = '';
    for (let i = 0; i < timeSig; i++) {
      const cls = activeBeat === i ? (i === 0 ? 'beat-dot on-beat-1' : 'beat-dot on-beat') : 'beat-dot';
      html += `<div class="${cls}" id="dot-${i}"></div>`;
    }
    container.innerHTML = html;
  }

  function flashBeat(beatIdx, timeSig, isAccent) {
    if (!document.getElementById('flashToggle').checked) return;
    for (let i = 0; i < timeSig; i++) {
      const dot = document.getElementById(`dot-${i}`);
      if (!dot) continue;
      if (i === beatIdx) {
        dot.className = isAccent ? 'beat-dot on-beat-1' : 'beat-dot on-beat';
        setTimeout(() => {
          if (dot) dot.className = 'beat-dot';
        }, 120);
      } else {
        dot.className = 'beat-dot';
      }
    }
  }

  function updateNowPlaying(segIdx, beatInMeasure, measureInSeg, beatsEl, timeSig) {
    if (segIdx >= segments.length) return;
    const seg = segments[segIdx];

    // BPM changed flash
    if (segIdx !== prevSegIdx) {
      const bpmEl = document.getElementById('npBpm');
      bpmEl.classList.add('changed');
      setTimeout(() => bpmEl.classList.remove('changed'), 600);
      prevSegIdx = segIdx;
      renderSegments();
      renderTimeline();
    }

    document.getElementById('npBpm').textContent = seg.bpm;
    document.getElementById('npLabel').textContent = 'BPM';

    // Running measure number
    let startMeasure = 0;
    for (let i = 0; i < segIdx; i++) startMeasure += segments[i].measures;
    const globalMeasure = startMeasure + measureInSeg + 1;
    const totalMeasures = segments.reduce((a, s) => a + s.measures, 0);

    document.getElementById('npProgress').innerHTML =
      `Measure <span>${globalMeasure}</span> / ${totalMeasures} &nbsp;|&nbsp; Beat <span>${beatInMeasure + 1}</span> / ${timeSig} &nbsp;|&nbsp; Segment <span>${segIdx + 1}</span> / ${segments.length}`;

    const pct = (beatsEl / totalBeats * 100).toFixed(1);
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function updatePlaybackUI() {
    setBeatDots(parseInt(document.getElementById('timeSig').value), -1);
  }

  function showStatus(msg, type='green') {
    const el = document.getElementById('statusBanner');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = type === 'red' ? 'rgba(227,91,91,.12)' : 'rgba(62,207,142,.12)';
    el.style.borderColor = type === 'red' ? 'rgba(227,91,91,.3)' : 'rgba(62,207,142,.3)';
    el.style.color = type === 'red' ? 'var(--red)' : 'var(--green)';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  function clearAll() {
    if (isPlaying) return;
    segments = [];
    renderSegments();
    renderTimeline();
  }

  function loadExample() {
    if (isPlaying) return;
    segments = [
      { bpm: 80, measures: 8 },
      { bpm: 88, measures: 8 },
      { bpm: 116, measures: 16 },
      { bpm: 126, measures: 8 },
    ];
    renderSegments();
    renderTimeline();
    showStatus('Example song loaded! 80 → 88 → 116 → 126 BPM', 'green');
  }

  // Toggle label
  document.getElementById('soundToggle').addEventListener('change', function() {
    document.getElementById('soundLabel').textContent = this.checked ? 'On' : 'Off';
  });

  // Time sig change refreshes dots
  document.getElementById('timeSig').addEventListener('change', function() {
    setBeatDots(parseInt(this.value), -1);
    renderSegments();
  });

  // Allow Enter key to add segment
  ['addBpm','addMeasures'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addSegment();
    });
  });

  // ─── Init ────────────────────────────────────────────────────────────────────
  setBeatDots(4, -1);
  renderSegments();
  renderTimeline();
</script>

</body>
</html>
